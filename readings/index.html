<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>阅读材料 · Readings · FDE</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../_assets/insight.css" />
<style>
  .index-page { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.2rem 6rem; }

  .section-label {
    font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .1em;
    color: var(--text-muted); padding-bottom: .5em; border-bottom: 1px solid var(--border);
    margin: 2.5rem 0 1rem;
  }
  .doc-list { list-style: none; padding: 0; margin: 0; }
  .doc-list li {
    display: flex; align-items: baseline; gap: .7rem;
    padding: .65em 0; border-bottom: 1px solid var(--border); font-size: .93rem;
  }
  .doc-list li:last-child { border-bottom: none; }
  .doc-date { color: var(--text-muted); font-size: .8rem; white-space: nowrap; flex-shrink: 0; }
  .doc-title { flex: 1; min-width: 0; }
  .doc-title a { color: var(--text); border-bottom: none; }
  .doc-title a:hover { color: var(--accent); }
  .doc-tags { display: flex; gap: .3rem; flex-shrink: 0; flex-wrap: wrap; }

  @media (max-width: 640px) {
    .index-page { padding: 1.6rem 1rem 4rem; }
    .doc-list li {
      flex-direction: column;
      align-items: flex-start;
      gap: .35rem;
      padding: .8em .2rem;
    }
    .doc-title { flex: unset; width: 100%; }
    .doc-tags { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-home"><a href="../index.html">← 首页</a></span>
      阅读材料 Readings
    </div>
    <div class="actions">
      <button class="icon-btn" id="themeBtn" title="切换主题" aria-label="切换主题">◐</button>
    </div>
  </div>
</div>

<div class="index-page">

  <div class="site-hero" style="padding: 2rem 0 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem;">
    <h1 style="font-size:1.9rem;margin:0 0 .3em;">阅读材料 <span style="font-family:var(--mono);font-size:.9rem;color:var(--text-muted);font-weight:500;">Readings</span></h1>
    <p style="color:var(--text-muted);margin:0;font-size:.95rem;">论文 / 文章 / 视频 / 演讲的深度解读 · 不止于摘要：机制、论断、可迁移的工程与产品判断</p>
  </div>

  <div class="section-label">全部解读 · 按日期倒序</div>
  <ul class="doc-list" data-render="readings" data-href-prefix="../">
    <li class="placeholder" style="color:var(--text-muted);font-style:italic;padding:.6em 0;">加载中…</li>
  </ul>

  <div style="margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border);font-size:.82rem;color:var(--text-muted);">
    <a href="../index.html">← 返回首页</a>
  </div>

</div>

<script src="../_assets/insight.js"></script>
<script src="../_assets/manifest-render.js"></script>
</body>
</html>
